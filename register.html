
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register |🌾KrushiSetu🚛</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4fff4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.register-container{
    width:100%;
    max-width:500px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h2{
    color:#28a745;
    font-weight:700;
}

.form-control{
    height:50px;
    border-radius:10px;
}

.btn-register{
    width:100%;
    height:50px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

.btn-register:hover{
    background:#218838;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    text-decoration:none;
    color:#28a745;
    font-weight:600;
}

</style>

</head>
<body>

<div class="register-container">

    <div class="logo">
        <h1>🌾KrushiSetu🚛</h1>
        <p>Create Your Account</p>
    </div>

    <form>

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="Enter Full Name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="tel" class="form-control" placeholder="Enter Mobile Number" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" placeholder="Enter Email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Village</label>
            <input type="text" class="form-control" placeholder="Enter Village Name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">District</label>
            <input type="text" class="form-control" placeholder="Enter District" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Create Password" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn-register">
            Register
        </button>

        <div class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </div>

    </form>

</div>

</body>
</html>
