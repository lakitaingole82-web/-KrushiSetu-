
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders | 🌾KrushiSetu🚜</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fa;
}

.sidebar{
    height:100vh;
    background:#f5f7fa;
    color:rgb(7, 1, 1);
    padding:20px;
}

.sidebar h3{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
}

.sidebar a:hover{
    background:#dfe3e1;(255,255,255,0.2);
}

.content{
    padding:30px;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.status-pending{
    color:#ffc107;
    font-weight:bold;
}

.status-completed{
    color:c#dfe3e1;
    font-weight:bold;
}

.status-cancelled{
    color:red;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar">
    

<!-- Content -->
<div class="col-md-10 content">

    <h2 class="mb-4">Orders Management</h2>

    <div class="card p-4">

        <table class="table table-hover align-middle">
            <thead class="table-success">
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Total Price</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>#1001</td>
                    <td>mahadev patil</td>
                    <td>Tomato</td>
                    <td>20 Kg</td>
                    <td>₹600</td>
                    <td class="status-pending">Pending</td>
                    <td>
                        <button class="btn btn-success btn-sm">
                            Accept
                        </button>

                        <button class="btn btn-danger btn-sm">
                            Reject
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>#1002</td>
                    <td>Amit Patil</td>
                    <td>Onion</td>
                    <td>50 Kg</td>
                    <td>₹1500</td>
                    <td class="status-completed">Completed</td>
                    <td>
                        <button class="btn btn-secondary btn-sm">
                            View
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>#1003</td>
                    <td>Priya Jadhav</td>
                    <td>Potato</td>
                    <td>30 Kg</td>
                    <td>₹900</td>
                    <td class="status-cancelled">Cancelled</td>
                    <td>
                        <button class="btn btn-secondary btn-sm">
                            View
                        </button>
                    </td>
                </tr>

            </tbody>
        </table>

    </div>

</div>

</div>
</div>

</body>
</html>
