
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Market Prices | Farm2Home</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5fdf6;
    font-family:'Poppins',sans-serif;
}

.navbar{
    background:#198754;
}

.navbar-brand{
    color:white;
    font-weight:bold;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.page-title{
    color:#198754;
    font-weight:700;
}

.table th{
    background:#198754;
    color:white;
}

.price-up{
    color:green;
    font-weight:bold;
}

.price-down{
    color:red;
    font-weight:bold;
}
</style>

</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">🌾 Farm2Home</a>
    </div>
</nav>

<div class="container py-5">

    <h2 class="text-center page-title mb-4">
        Today's Market Prices
    </h2>

    <div class="card p-4">

        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center">

                <thead>
                    <tr>
                        <th>Crop</th>
                        <th>Market</th>
                        <th>Min Price (₹)</th>
                        <th>Max Price (₹)</th>
                        <th>Average Price (₹)</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>Tomato</td>
                        <td>Pune</td>
                        <td>1200</td>
                        <td>1800</td>
                        <td>1500</td>
                        <td class="price-up">⬆ High</td>
                    </tr>

                    <tr>
                        <td>Onion</td>
                        <td>Nashik</td>
                        <td>1500</td>
                        <td>2200</td>
                        <td>1850</td>
                        <td class="price-up">⬆ High</td>
                    </tr>

                    <tr>
                        <td>Potato</td>
                        <td>Kolhapur</td>
                        <td>900</td>
                        <td>1300</td>
                        <td>1100</td>
                        <td class="price-down">⬇ Low</td>
                    </tr>

                    <tr>
                        <td>Wheat</td>
                        <td>Solapur</td>
                        <td>2400</td>
                        <td>2900</td>
                        <td>2650</td>
                        <td class="price-up">⬆ High</td>
                    </tr>

                    <tr>
                        <td>Soybean</td>
                        <td>Latur</td>
                        <td>4200</td>
                        <td>5100</td>
                        <td>4650</td>
                        <td class="price-up">⬆ High</td>
                    </tr>

                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>
