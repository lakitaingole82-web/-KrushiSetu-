<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farmer Login |🌾KrushiSetu🚜</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#e8fff0,#ffffff);
    padding:20px;
}

/* Main Card */

.login-container{
    width:100%;
    max-width:1000px;
    background:#fff;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.12);
}

.row-custom{
    display:flex;
    flex-wrap:wrap;
}

/* Left Side */

.left-side{
    flex:1;
    min-width:350px;
    background:linear-gradient(135deg,#198754,#42d392);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:50px;
    text-align:center;
}

.left-side img{
    width:280px;
    margin-bottom:20px;
}

.left-side h2{
    font-weight:700;
    margin-bottom:15px;
}

/* Right Side */

.right-side{
    flex:1;
    min-width:350px;
    padding:50px;
}

.logo{
    color:#198754;
    font-size:30px;
    font-weight:700;
    text-align:center;
}

.title{
    text-align:center;
    margin-top:15px;
    font-weight:700;
    color:#222;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

/* Inputs */

.form-control{
    height:55px;
    border-radius:12px;
    margin-bottom:15px;
}

.form-control:focus{
    border-color:#198754;
    box-shadow:none;
}

/* Button */

.btn-login{
    width:100%;
    height:55px;
    border:none;
    border-radius:12px;
    background:#198754;
    color:white;
    font-size:17px;
    font-weight:600;
    transition:.3s;
}

.btn-login:hover{
    background:#157347;
}

/* Social */

.social-container{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:25px 0;
}

.social{
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:white;
    font-size:20px;
    transition:.4s;
}

.facebook{
    background:#1877F2;
}

.instagram{
    background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}

.gmail{
    background:#34A853;
}

.twitter{
    background:#000;
}

.social:hover{
    transform:translateY(-8px) scale(1.1);
}

.divider{
    text-align:center;
    color:#777;
    margin:15px 0;
}

.extra-links{
    text-align:center;
    margin-top:15px;
}

.extra-links a{
    color:#198754;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:768px){

.left-side{
    display:none;
}

.right-side{
    padding:35px;
}

}

</style>

</head>

<body>

<div class="login-container">

<div class="row-custom">

<!-- Left Side -->

<div class="left-side">

<img src="https://cdn-icons-png.flaticon.com/512/628/628324.png">

<h2>Welcome Farmer 👨‍🌾</h2>

<p>
Sell your vegetables, fruits and crops directly to customers without middlemen.
</p>

</div>

<!-- Right Side -->

<div class="right-side">

<div class="logo">
🌾KrushiSetu🚜
</div>

<h3 class="title">
Farmer Login
</h3>

<p class="subtitle">
Access your farm dashboard
</p>

<form>

<input
type="email"
class="form-control"
placeholder="Email Address"
required>

<input
type="password"
class="form-control"
placeholder="Password"
required>

<button class="btn-login">
<i class="fas fa-right-to-bracket"></i>
 Login
</button>
<a href="index.html"></a>
</form>

<div class="divider">
OR LOGIN WITH
</div>

<div class="social-container">

<a href="#" class="social facebook">
<i class="fab fa-facebook-f"></i>
</a>

<a href="#" class="social instagram">
<i class="fab fa-instagram"></i>
</a>



<a href="#" class="social twitter">
<i class="fab fa-x-twitter"></i>
</a>

</div>

<div class="extra-links">

<p>
Don't have an account?
<a href="register.html">
Register Now
</a>
</p>

<p>
<a href="#">
Forgot Password?
</a>
</p>

</div>

</div>

</div>

</div>

</body>
</html>
