<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product | 🌾KrushiSetu🚛</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#f4fff6;
    font-family:'Segoe UI',sans-serif;
}

/* Navbar */

.navbar{
    background:white;
    box-shadow:0 2px 15px rgba(0,0,0,.08);
}

.navbar-brand{
    color:#198754 !important;
    font-size:28px;
    font-weight:700;
}

/* Header */

.page-header{
    background:linear-gradient(135deg,#198754,#42d392);
    color:white;
    padding:60px 0;
    text-align:center;
}

.page-header h1{
    font-weight:700;
}

/* Form */

.form-section{
    margin-top:-40px;
}

.form-card{
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.form-label{
    font-weight:600;
    color:#333;
}

.form-control,
.form-select{
    border-radius:12px;
    padding:12px;
}

.form-control:focus,
.form-select:focus{
    border-color:#198754;
    box-shadow:none;
}

.btn-success{
    background:#198754;
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:600;
}

.btn-success:hover{
    background:#146c43;
}

/* Footer */

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand" href="index.html">

</a>

<a href="customer dash board.html" class="btn btn-success">
Dashboard
</a>

</div>
</nav>

<!-- Header -->

<section class="page-header">
<div class="container">
<h1>🌾KrushiSetu🚛</h1>
<h2>🧺 Add Your Farm Product</h2>

<p>
Sell vegetables, fruits and crops directly to customers.
</p>

</div>
</section>

<!-- Form -->

<section class="form-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="form-card">

<form>

<h4 class="mb-4 text-success">
👨‍🌾 Farmer Information
</h4>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Farmer Name</label>
<input type="text" class="form-control" placeholder="Enter your name">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Mobile Number</label>
<input type="tel" class="form-control" placeholder="Enter mobile number">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Village</label>
<input type="text" class="form-control" placeholder="Village Name">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">District</label>
<input type="text" class="form-control" placeholder="District Name">
</div>

</div>

<hr class="my-4">

<h4 class="mb-4 text-success">
🥬 Product Information
</h4>

<div class="mb-3">
<label class="form-label">Product Name</label>
<input type="text" class="form-control" placeholder="Tomato, Mango, Onion etc.">
</div>

<div class="mb-3">
<label class="form-label">Category</label>

<select class="form-select">
<option>Select Category</option>
<option>Vegetables</option>
<option>Fruits</option>
<option>Grains</option>
<option>Pulses</option>
<option>Organic Products</option>
</select>

</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Price Per Kg (₹)</label>
<input type="number" class="form-control" placeholder="Price">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Available Quantity (Kg)</label>
<input type="number" class="form-control" placeholder="Quantity">
</div>

</div>

<div class="mb-3">
<label class="form-label">Harvest Date</label>
<input type="date" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Product Image</label>
<input type="file" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea rows="4" class="form-control"
placeholder="Write product details..."></textarea>
</div>

<div class="d-grid">

<button type="submit" class="btn btn-success btn-lg">
<i class="fas fa-upload"></i>
 Add Product For Sale
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</section>

<!-- Footer -->

<footer>

<h5>🌾KrushiSetu🚛</h5>

<p>
Connecting Farmers Directly With Customers
</p>

<p>
© 2026 🌾KrushiSetu🚛
</p>

</footer>

</body>
</html>
